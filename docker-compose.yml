# Three services: web + worker share ONE application image; postgres backs them.
#
#   Local dev : docker compose up --build      (builds the image from ./Dockerfile)
#   Production: docker compose pull && docker compose up -d
#               (pulls ghcr.io/gabedsam01/meet-transcription:latest — see README
#                "GHCR Image" and docs/deploy/dokploy.md)
#
# PostgreSQL is the single source of truth — there is NO SQLite mode. Every
# variable has a safe default so `docker compose config`/`build` work without a
# populated .env; production MUST override the secrets.

x-app: &app
  # `image` doubles as the local build tag, so the same name resolves whether you
  # build locally or pull the published image in production.
  image: ghcr.io/gabedsam01/meet-transcription:latest
  build: .
  env_file:
    - path: .env
      required: false
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy

# Queue + local-transcription configuration, shared by web (enqueue + UI status)
# and worker (consume + transcribe). Every value has a safe default so
# `docker compose config`/`build` work without a populated .env. Local engines are
# OFF by default (Deepgram per-user keys); flip LOCAL_TRANSCRIPTION_ENABLED=true and
# build the image with the engine you want (see docs/architecture/local-transcription.md).
x-transcription-env: &transcription-env
  QUEUE_BACKEND: ${QUEUE_BACKEND:-redis}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  QUEUE_NAME: ${QUEUE_NAME:-transcription}
  TRANSCRIPTION_GLOBAL_LOCK_TTL_SECONDS: ${TRANSCRIPTION_GLOBAL_LOCK_TTL_SECONDS:-14400}
  LOCAL_TRANSCRIPTION_ENABLED: ${LOCAL_TRANSCRIPTION_ENABLED:-false}
  LOCAL_TRANSCRIPTION_ENGINE: ${LOCAL_TRANSCRIPTION_ENGINE:-faster-whisper}
  LOCAL_TRANSCRIPTION_MODEL: ${LOCAL_TRANSCRIPTION_MODEL:-small}
  LOCAL_TRANSCRIPTION_LANGUAGE: ${LOCAL_TRANSCRIPTION_LANGUAGE:-auto}
  LOCAL_TRANSCRIPTION_THREADS: ${LOCAL_TRANSCRIPTION_THREADS:-4}
  LOCAL_TRANSCRIPTION_MODEL_DIR: ${LOCAL_TRANSCRIPTION_MODEL_DIR:-/models}
  LOCAL_TRANSCRIPTION_COMPUTE_TYPE: ${LOCAL_TRANSCRIPTION_COMPUTE_TYPE:-int8}
  LOCAL_TRANSCRIPTION_QUANTIZATION: ${LOCAL_TRANSCRIPTION_QUANTIZATION:-q4_0}
  LOCAL_TRANSCRIPTION_MODEL_PATH: ${LOCAL_TRANSCRIPTION_MODEL_PATH:-}
  WHISPER_CPP_BINARY: ${WHISPER_CPP_BINARY:-}
  LOCAL_TRANSCRIPTION_AUTO_DOWNLOAD: ${LOCAL_TRANSCRIPTION_AUTO_DOWNLOAD:-false}
  LOCAL_TRANSCRIPTION_DOC_URL: ${LOCAL_TRANSCRIPTION_DOC_URL:-https://github.com/gabedsam01/meet-transcription/blob/main/docs/architecture/local-transcription.md}

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meet_transcription}
      POSTGRES_USER: ${POSTGRES_USER:-meet_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meet_user} -d ${POSTGRES_DB:-meet_transcription}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Redis — transcription queue + single global execution lock. With QUEUE_BACKEND=
  # redis the web enqueues job ids and the worker consumes them one at a time, so
  # concurrent "Run once" clicks never run two CPU transcriptions at once.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # One-shot schema migration. Runs `alembic upgrade head` against PostgreSQL and
  # exits; web and worker wait for it to finish successfully before starting, so
  # the schema is always current before any request is served or job is claimed.
  # Reuses the application image (alembic + alembic.ini are baked into it) and the
  # same DATABASE_URL. Inherits `depends_on: postgres healthy` from the *app anchor.
  migrate:
    <<: *app
    command: ["alembic", "upgrade", "head"]
    restart: "no"   # one-shot job: must NOT be restarted after it exits 0.
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://meet_user:change_me@postgres:5432/meet_transcription}

  # Serves the UI and OAuth flow. Creates pending jobs only — it never downloads,
  # transcribes, or uploads. The Web UI uses per-user encrypted Deepgram keys, so
  # it needs no global DEEPGRAM_API_KEY.
  web:
    <<: *app
    command: ["uvicorn", "app.web.main:app", "--host", "0.0.0.0", "--port", "8000"]
    # Override the anchor's depends_on: wait for the schema to be migrated, not
    # just for Postgres to be reachable.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *transcription-env
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://meet_user:change_me@postgres:5432/meet_transcription}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-me-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      GOOGLE_WEB_CLIENT_ID: ${GOOGLE_WEB_CLIENT_ID:-}
      GOOGLE_WEB_CLIENT_SECRET: ${GOOGLE_WEB_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/oauth/google/callback}
      WORKER_REPOSITORY_BACKEND: ${WORKER_REPOSITORY_BACKEND:-postgres}
      TMP_DIR: ${TMP_DIR:-/app/tmp}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data   # scratch/temp only; the database lives in Postgres
      - ./tmp:/app/tmp
      - ./secrets:/app/secrets:ro
      - ./models:/models:ro   # local model files (validated for UI status)

  # Owns all processing: claims pending jobs from PostgreSQL, downloads the MP4,
  # transcribes with the user's per-user Deepgram key, optionally uploads to Drive.
  worker:
    <<: *app
    command: ["python", "-m", "app.worker.main"]
    # Override the anchor's depends_on: wait for the schema to be migrated before
    # claiming any job.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *transcription-env
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://meet_user:change_me@postgres:5432/meet_transcription}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-me-in-production}
      WORKER_REPOSITORY_BACKEND: ${WORKER_REPOSITORY_BACKEND:-postgres}
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-30}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}
      STALE_JOB_TIMEOUT_MINUTES: ${STALE_JOB_TIMEOUT_MINUTES:-30}
      TMP_DIR: ${TMP_DIR:-/app/tmp}
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
      - ./secrets:/app/secrets:ro
      - ./models:/models:ro   # local model files (faster-whisper cache / whisper.cpp .bin)

volumes:
  postgres_data:
  redis_data:
