# Three services: web + worker share ONE application image; postgres backs them.
#
#   Local dev : docker compose up --build      (builds the image from ./Dockerfile)
#   Production: docker compose pull && docker compose up -d
#               (pulls ghcr.io/gabedsam01/meet-transcription:latest — see README
#                "GHCR Image" and docs/deploy/dokploy.md)
#
# PostgreSQL is the single source of truth — there is NO SQLite mode. Every
# variable has a safe default so `docker compose config`/`build` work without a
# populated .env; production MUST override the secrets.

x-app: &app
  # `image` doubles as the local build tag, so the same name resolves whether you
  # build locally or pull the published image in production.
  image: ghcr.io/gabedsam01/meet-transcription:latest
  build: .
  env_file:
    - path: .env
      required: false
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meet_transcription}
      POSTGRES_USER: ${POSTGRES_USER:-meet_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meet_user} -d ${POSTGRES_DB:-meet_transcription}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Serves the UI and OAuth flow. Creates pending jobs only — it never downloads,
  # transcribes, or uploads. The Web UI uses per-user encrypted Deepgram keys, so
  # it needs no global DEEPGRAM_API_KEY.
  web:
    <<: *app
    command: ["uvicorn", "app.web.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://meet_user:change_me@postgres:5432/meet_transcription}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-me-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      GOOGLE_WEB_CLIENT_ID: ${GOOGLE_WEB_CLIENT_ID:-}
      GOOGLE_WEB_CLIENT_SECRET: ${GOOGLE_WEB_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/oauth/google/callback}
      WORKER_REPOSITORY_BACKEND: ${WORKER_REPOSITORY_BACKEND:-postgres}
      TMP_DIR: ${TMP_DIR:-/app/tmp}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data   # scratch/temp only; the database lives in Postgres
      - ./tmp:/app/tmp
      - ./secrets:/app/secrets:ro

  # Owns all processing: claims pending jobs from PostgreSQL, downloads the MP4,
  # transcribes with the user's per-user Deepgram key, optionally uploads to Drive.
  worker:
    <<: *app
    command: ["python", "-m", "app.worker.main"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://meet_user:change_me@postgres:5432/meet_transcription}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-me-in-production}
      WORKER_REPOSITORY_BACKEND: ${WORKER_REPOSITORY_BACKEND:-postgres}
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-30}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}
      STALE_JOB_TIMEOUT_MINUTES: ${STALE_JOB_TIMEOUT_MINUTES:-30}
      TMP_DIR: ${TMP_DIR:-/app/tmp}
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
      - ./secrets:/app/secrets:ro

volumes:
  postgres_data:
