x-app: &app
  build: .
  env_file:
    - .env
  restart: unless-stopped

services:
  worker:
    <<: *app
    command: ["python", "-m", "app.main", "--watch"]
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
      - ./secrets:/app/secrets

  web:
    <<: *app
    command: ["uvicorn", "app.web.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
      - ./secrets:/app/secrets:ro

  transcription-worker:
    <<: *app
    command: ["python", "-m", "app.worker.main"]
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
      - ./secrets:/app/secrets:ro
    # NOTE: requires PostgreSQL. The `db` service, `depends_on: [db]`, and the
    # SQLAlchemy/psycopg dependencies are delivered by feat/postgres-core. This
    # branch intentionally does not add them.
