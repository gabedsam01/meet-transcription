{% extends "base.html" %}
{% block content %}
<section class="card">
  <h1>Settings</h1>
  <p class="hint">Choose what you want to configure.</p>
  <div class="options">
    <div class="option">
      <div>
        <h2>Drive folders</h2>
        <p class="muted">Source and destination Google Drive folders and the poll interval.</p>
      </div>
      <a class="button button-sm" href="/settings/drive">Configure</a>
    </div>
    <div class="option">
      <div>
        <h2>Deepgram API key</h2>
        <p class="muted">Speech-to-text key used to transcribe your recordings.</p>
      </div>
      <a class="button button-sm" href="/settings/deepgram">Configure</a>
    </div>
  </div>
</section>
{% endblock %}
