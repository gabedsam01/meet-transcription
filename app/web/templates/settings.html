{% extends "base.html" %}
{% block content %}
<section class="card">
  <h1>Settings</h1>
  <p class="hint">Choose what you want to configure.</p>
  <div class="options">
    <div class="option">
      <div>
        <h2>Drive folders</h2>
        <p class="muted">Source and destination Google Drive folders (paste a folder URL).</p>
      </div>
      <a class="button button-sm" href="/settings/drive">Configure</a>
    </div>
    <div class="option">
      <div>
        <h2>Models</h2>
        <p class="muted">Provedor de transcrição, modelo, chaves (criptografadas) e fallback.</p>
      </div>
      <a class="button button-sm" href="/models">Configure</a>
    </div>
  </div>
</section>
{% endblock %}
