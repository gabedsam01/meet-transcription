{% extends "base.html" %}
{% block content %}
<section class="card">
  <h1>Settings</h1>
  <form method="post" action="/settings" class="form-stack">
    <label>Source Drive Folder ID<input name="source_drive_folder_id" value="{{ settings.source_drive_folder_id if settings else '' }}" required></label>
    <label>Destination Drive Folder ID<input name="destination_drive_folder_id" value="{{ settings.destination_drive_folder_id if settings else '' }}" required></label>
    <button type="submit">Save settings</button>
  </form>
</section>
{% endblock %}
