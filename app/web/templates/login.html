{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">Entrar</h1>
    <p class="page-subtitle">Entre com seu email e senha.</p>
  </div>
</div>

<section class="card narrow" style="max-width:420px; margin:0 auto">
  {% if error %}
  <div class="alert alert-danger mb-1">
    <strong>Erro:</strong> {{ error }}
  </div>
  {% endif %}
  <form method="post" action="/login" class="form-grid">
    <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
    <div class="form-field">
      <label class="form-label" for="login-username">Email</label>
      <input class="input" id="login-username" name="username" type="text" autocomplete="username" required>
    </div>
    <div class="form-field">
      <label class="form-label" for="login-password">Senha</label>
      <input class="input" id="login-password" name="password" type="password" autocomplete="current-password" required>
    </div>
    <div class="form-field" style="align-self:end">
      <button type="submit" class="btn btn-primary" style="width:100%">Entrar</button>
    </div>
  </form>
</section>
{% endblock %}
