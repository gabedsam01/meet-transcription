<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meet Audio Recorder</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="panel">
      <header class="header">
        <div>
          <h1 class="title">Meet Audio Recorder</h1>
          <p class="subtitle">Envie gravações para o seu painel.</p>
        </div>
        <!-- Visual recording indicator: red pulsing dot when active. -->
        <span id="indicator" class="indicator idle" aria-live="polite">
          <span class="dot"></span>
          <span id="indicator-label" class="indicator-label">Parado</span>
        </span>
      </header>

      <section class="controls">
        <button id="start-btn" class="btn btn-primary" type="button">
          Iniciar gravação
        </button>
        <button id="stop-btn" class="btn btn-danger" type="button" disabled>
          Parar gravação
        </button>
      </section>

      <p id="status" class="status" role="status" aria-live="polite">Parado</p>

      <section class="settings" aria-label="Configurações da extensão">
        <h2 class="section-title">Configuração</h2>
        <form id="settings-form" class="settings-form">
          <label class="field">
            <span class="field-label">URL do backend</span>
            <input
              id="backend-url"
              type="url"
              inputmode="url"
              placeholder="https://seu-backend.exemplo.com"
              autocomplete="off"
            />
          </label>

          <label class="field">
            <span class="field-label">Token de upload</span>
            <!-- type=password so the token is masked and never shoulder-surfed. -->
            <input
              id="upload-token"
              type="password"
              placeholder="Cole o token gerado em /extensao"
              autocomplete="off"
            />
          </label>

          <label class="check-row">
            <input id="capture-mic" type="checkbox" />
            <span>Também gravar meu microfone</span>
          </label>

          <div class="settings-actions">
            <button id="save-settings" class="btn btn-secondary" type="submit">
              Salvar
            </button>
            <button id="test-connection" class="btn btn-ghost" type="button">
              Testar conexão
            </button>
          </div>
          <p id="settings-status" class="settings-status" aria-live="polite"></p>
        </form>
      </section>

      <p class="hint">
        Salve a URL e o token, aceite a permissão do domínio e teste a conexão
        antes de gravar. Abra uma aba do Google Meet para iniciar.
      </p>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
